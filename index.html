<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0a1628">
<title>الحاج أحمد الحديدي - تجارة الأسماك</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --ocean-deep: #0a1628; --ocean-mid: #0d2137; --ocean-surface: #0e3460;
    --wave-blue: #1565c0; --cyan-glow: #00b4d8; --gold: #ffd700;
    --emerald: #00c896; --danger: #ff4757; --warning: #ffa502;
    --text-primary: #e8f4f8; --text-secondary: #90caf9;
    --glass: rgba(255,255,255,0.07); --glass-border: rgba(255,255,255,0.12);
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; font-family: 'Cairo', sans-serif; background: var(--ocean-deep); color: var(--text-primary); }
  
  /* Login Screen */
  #login-screen {
    position: fixed; inset: 0; z-index: 9999;
    background: linear-gradient(135deg, #040d1a 0%, #061525 50%, #050f1e 100%);
    display: flex; align-items: center; justify-content: center; padding: 20px;
  }
  #login-screen.hidden { display: none; }
  .login-box {
    width: 100%; max-width: 380px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 24px; padding: 36px 28px 32px;
    backdrop-filter: blur(20px); box-shadow: 0 20px 60px rgba(0,0,0,0.6);
    text-align: center;
  }
  .login-fish { font-size: 56px; margin-bottom: 10px; }
  .login-title { font-size: 20px; font-weight: 900; color: var(--gold); margin-bottom: 4px; }
  .login-subtitle { font-size: 12px; color: var(--text-secondary); margin-bottom: 28px; }
  .login-dots { display: flex; justify-content: center; gap: 8px; margin-bottom: 20px; }
  .login-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--glass-border); transition: all 0.2s; }
  .login-dot.filled { background: var(--cyan-glow); box-shadow: 0 0 8px var(--cyan-glow); }
  .login-input {
    width: 100%; padding: 14px; border-radius: 12px; border: 1px solid var(--glass-border);
    background: rgba(255,255,255,0.07); color: var(--text-primary);
    font-family: 'Cairo', sans-serif; font-size: 22px; font-weight: 700;
    text-align: center; letter-spacing: 8px; outline: none;
  }
  .login-input:focus { border-color: var(--cyan-glow); }
  .login-btn {
    width: 100%; padding: 14px; border-radius: 12px; border: none;
    background: linear-gradient(135deg, var(--cyan-glow), var(--wave-blue));
    color: white; font-family: 'Cairo', sans-serif; font-size: 16px; font-weight: 900;
    cursor: pointer; margin-top: 15px;
  }
  .login-error { color: var(--danger); font-size: 12px; margin-top: 10px; min-height: 18px; }

  /* Main App Structure */
  #bg-canvas { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 0; pointer-events: none; }
  #app { position: relative; z-index: 1; height: 100vh; display: flex; flex-direction: column; }
  
  .app-header {
    background: linear-gradient(135deg, rgba(10,22,40,0.95) 0%, rgba(13,33,55,0.95) 100%);
    backdrop-filter: blur(20px); border-bottom: 1px solid var(--glass-border);
    padding: 12px 16px; display: flex; align-items: center; justify-content: space-between;
    box-shadow: 0 4px 20px rgba(0,0,0,0.5); position: relative; z-index: 10;
  }
  .header-title { font-size: 15px; font-weight: 900; color: var(--gold); }
  .header-date { font-size: 11px; color: var(--cyan-glow); }
  
  .bottom-nav {
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 100;
    background: rgba(10,22,40,0.97); backdrop-filter: blur(20px);
    border-top: 1px solid var(--glass-border);
    display: flex; padding: 8px 0;
  }
  .nav-item {
    flex: 1; display: flex; flex-direction: column; align-items: center; gap: 4px;
    cursor: pointer; padding: 6px 4px; border: none; background: none;
    color: var(--text-secondary); font-family: 'Cairo', sans-serif;
  }
  .nav-item.active { color: var(--cyan-glow); }
  .nav-item .nav-icon { font-size: 22px; }
  .nav-item .nav-label { font-size: 10px; font-weight: 600; }

  .content { flex: 1; overflow-y: auto; padding: 12px 12px 80px; scroll-behavior: smooth; }
  .page { display: none; }
  .page.active { display: block; }

  .glass-card {
    background: var(--glass); border: 1px solid var(--glass-border);
    border-radius: 16px; backdrop-filter: blur(10px); padding: 16px; margin-bottom: 12px;
  }
  .section-title {
    font-size: 13px; font-weight: 700; color: var(--text-secondary);
    text-transform: uppercase; letter-spacing: 1px; margin-bottom: 12px;
    display: flex; align-items: center; gap: 8px;
  }
  .section-title::after { content:''; flex:1; height:1px; background:var(--glass-border); }
  
  /* Forms & Inputs */
  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 6px; display: block; }
  .form-input, .form-select {
    width: 100%; padding: 12px 14px; border-radius: 10px;
    border: 1px solid var(--glass-border); background: rgba(255,255,255,0.06);
    color: var(--text-primary); font-family: 'Cairo', sans-serif; font-size: 14px;
    outline: none; transition: all 0.3s;
  }
  .form-input:focus { border-color: var(--cyan-glow); background: rgba(0,180,216,0.08); }
  input[type="date"] { color-scheme: dark; }

  /* Buttons */
  .btn {
    padding: 12px 20px; border-radius: 12px; border: none;
    font-family: 'Cairo', sans-serif; font-size: 14px; font-weight: 700;
    cursor: pointer; transition: all 0.25s; display: flex; align-items: center; gap: 8px;
    justify-content: center; width: 100%; margin-bottom: 8px;
  }
  .btn-primary { background: linear-gradient(135deg, var(--cyan-glow), var(--wave-blue)); color: white; }
  .btn-gold { background: linear-gradient(135deg, #ffd700, #ff8c00); color: #1a1200; }
  .btn-danger { background: linear-gradient(135deg, var(--danger), #c0392b); color: white; }
  
  /* Clients List */
  .client-card {
    background: var(--glass); border: 1px solid var(--glass-border);
    border-radius: 14px; padding: 14px; margin-bottom: 10px; cursor: pointer;
  }
  .client-name { font-size: 15px; font-weight: 700; color: var(--text-primary); }
  .client-phone { font-size: 12px; color: var(--text-secondary); margin-top: 2px; }
  
  /* Toast */
  .toast {
    position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
    background: var(--ocean-mid); border: 1px solid var(--glass-border);
    border-radius: 12px; padding: 12px 20px; font-size: 13px; font-weight: 600;
    color: var(--text-primary); z-index: 500; box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    animation: toastIn 0.3s ease; white-space: nowrap;
  }
  @keyframes toastIn { from{opacity:0;transform:translateX(-50%) translateY(-10px)} to{opacity:1;transform:translateX(-50%) translateY(0)} }
  
  /* Comparison Tool Specific */
  .comparison-result-box {
    margin-top: 15px; padding: 15px; border-radius: 12px;
    background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border);
  }
  .winner-card {
    background: linear-gradient(135deg, rgba(255,215,0,0.15), rgba(255,215,0,0.05));
    border: 1px solid rgba(255,215,0,0.4); border-radius: 10px; padding: 12px;
    margin-top: 10px; text-align: center;
  }
</style>
</head>
<body>

<!-- LOGIN SCREEN -->
<div id="login-screen">
  <div class="login-box">
    <div class="login-fish">🐟</div>
    <div class="login-title">الحاج أحمد الحديدي</div>
    <div class="login-subtitle">تجارة الأسماك — يرجى تسجيل الدخول</div>
    <div class="login-dots">
      <div class="login-dot" id="dot-0"></div>
      <div class="login-dot" id="dot-1"></div>
      <div class="login-dot" id="dot-2"></div>
      <div class="login-dot" id="dot-3"></div>
      <div class="login-dot" id="dot-4"></div>
      <div class="login-dot" id="dot-5"></div>
    </div>
    <input type="password" id="login-password" class="login-input"
      placeholder="••••••" maxlength="6" inputmode="numeric"
      oninput="onLoginInput(this.value)">
    <button class="login-btn" onclick="doLogin()">🔐 دخول</button>
    <div class="login-error" id="login-error"></div>
  </div>
</div>

<canvas id="bg-canvas"></canvas>

<div id="app">
  <header class="app-header">
    <div>
      <div class="header-title">الحاج أحمد الحديدي</div>
      <div class="header-date" id="header-date"></div>
    </div>
    <div onclick="confirmLogout()" style="cursor:pointer;font-size:12px;color:var(--text-secondary)">🚪 خروج</div>
  </header>

  <div class="content" id="main-content">
    <!-- HOME PAGE -->
    <div class="page active" id="page-home">
      <div class="glass-card">
        <div class="section-title">📊 إحصائيات عامة</div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">
          <div style="background:rgba(0,180,216,0.1);padding:15px;border-radius:12px;text-align:center">
            <div style="font-size:20px;font-weight:900;color:var(--cyan-glow)" id="stat-sales">0</div>
            <div style="font-size:11px;color:var(--text-secondary)">مبيعات اليوم</div>
          </div>
          <div style="background:rgba(255,71,87,0.1);padding:15px;border-radius:12px;text-align:center">
            <div style="font-size:20px;font-weight:900;color:var(--danger)" id="stat-debt">0</div>
            <div style="font-size:11px;color:var(--text-secondary)">إجمالي الديون</div>
          </div>
        </div>
      </div>
    </div>

    <!-- INVOICE PAGE -->
    <div class="page" id="page-invoice">
      <div class="glass-card">
        <div class="section-title">🧾 فاتورة جديدة</div>
        <div class="form-group">
          <label class="form-label">التاريخ</label>
          <input type="date" id="inv-date" class="form-input">
        </div>
        <div class="form-group">
          <label class="form-label">اسم العميل</label>
          <input type="text" id="inv-client" class="form-input" placeholder="اسم التاجر">
        </div>
        <div class="form-group">
          <label class="form-label">رقم الهاتف</label>
          <input type="tel" id="inv-phone" class="form-input" placeholder="01xxxxxxxxx" maxlength="11">
        </div>
        <button class="btn btn-primary" onclick="saveInvoice()">💾 حفظ الفاتورة</button>
      </div>
    </div>

    <!-- CLIENTS PAGE -->
    <div class="page" id="page-clients">
      <div class="glass-card">
        <div class="section-title">👥 العملاء</div>
        <input type="text" id="client-search" class="form-input" placeholder="ابحث..." style="margin-bottom:15px" oninput="renderClients()">
        <div id="clients-list"></div>
      </div>
    </div>

    <!-- HISTORY PAGE -->
    <div class="page" id="page-history">
      <div class="glass-card">
        <div class="section-title">📚 سجل الفواتير</div>
        <div id="history-list"></div>
      </div>
    </div>

    <!-- PRICES PAGE -->
    <div class="page" id="page-prices">
      <div class="glass-card">
        <div class="section-title">📈 الأسعار والمقارنة</div>
        
        <!-- Comparison Tool -->
        <div style="background: rgba(0, 180, 216, 0.05); border: 1px solid rgba(0, 180, 216, 0.2); border-radius: 14px; padding: 14px; margin-bottom: 14px;">
          <div style="font-size: 14px; font-weight: 900; color: var(--cyan-glow); margin-bottom: 12px;">⚖️ مقارنة بين عميلين</div>
          <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 10px;">
             <select id="cmp-client1" class="form-select"><option value="">العميل الأول</option></select>
             <select id="cmp-client2" class="form-select"><option value="">العميل الثاني</option></select>
          </div>
          <div style="display: grid; grid-template-columns: 1.5fr 1fr; gap: 8px; margin-bottom: 10px;">
             <select id="cmp-fish" class="form-select"><option value="">اختر الصنف</option></select>
             <input type="date" id="cmp-date" class="form-input" style="padding:9px">
          </div>
          <button class="btn btn-gold" onclick="runPriceComparison()" style="margin-bottom:0">🔍 عرض المقارنة</button>
          <div id="cmp-result" style="margin-top: 12px; display: none;"></div>
        </div>

        <div id="prices-content"></div>
      </div>
    </div>
  </div>

  <nav class="bottom-nav">
    <button class="nav-item active" onclick="switchPage('home',this)">
      <span class="nav-icon">🏠</span><span class="nav-label">الرئيسية</span>
    </button>
    <button class="nav-item" onclick="switchPage('invoice',this)">
      <span class="nav-icon">➕</span><span class="nav-label">فاتورة</span>
    </button>
    <button class="nav-item" onclick="switchPage('clients',this)">
      <span class="nav-icon">👥</span><span class="nav-label">العملاء</span>
    </button>
    <button class="nav-item" onclick="switchPage('history',this)">
      <span class="nav-icon">📚</span><span class="nav-label">السجل</span>
    </button>
    <button class="nav-item" onclick="switchPage('prices',this)">
      <span class="nav-icon">💹</span><span class="nav-label">الأسعار</span>
    </button>
  </nav>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import { getDatabase, ref, set, get, onValue, push } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAGDzSO4r9KQhAiMKs5k3PlIPbIwvXVcmw",
  authDomain: "tager-eb62a.firebaseapp.com",
  databaseURL: "https://tager-eb62a-default-rtdb.firebaseio.com",
  projectId: "tager-eb62a",
  storageBucket: "tager-eb62a.firebasestorage.app",
  messagingSenderId: "956994118059",
  appId: "1:956994118059:web:b9949fd0d68eecf6c132ee"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ============================================================
// STATE & DATA
// ============================================================
window.appState = {
  invoices: {},
  clients: {},
  currentUser: null
};

const USERS = {
  '666666': { role: 'admin', name: 'أستاذ باسل' },
  '123456': { role: 'viewer', name: 'محاسب' }
};

// ============================================================
// AUTH FUNCTIONS
// ============================================================
window.onLoginInput = function(val) {
  for (let i = 0; i < 6; i++) {
    const dot = document.getElementById('dot-' + i);
    if (dot) dot.classList.toggle('filled', i < val.length);
  }
  if (val.length === 6) setTimeout(() => doLogin(), 200);
};

window.doLogin = function() {
  const pwd = document.getElementById('login-password').value;
  const user = USERS[pwd];
  if (user) {
    window.appState.currentUser = user;
    document.getElementById('login-screen').classList.add('hidden');
    showToast(`✅ مرحباً ${user.name}`);
    initApp();
  } else {
    document.getElementById('login-error').textContent = '❌ كلمة المرور غير صحيحة';
    document.getElementById('login-password').value = '';
    document.querySelectorAll('.login-dot').forEach(d => d.classList.remove('filled'));
  }
};

window.confirmLogout = function() {
  if (confirm('هل تريد تسجيل الخروج؟')) {
    location.reload();
  }
};

// ============================================================
// INITIALIZATION
// ============================================================
function initApp() {
  updateDate();
  setupListeners();
  initInvoiceForm();
  initComparisonTools(); // Initialize dropdowns for comparison
}

function updateDate() {
  const now = new Date();
  document.getElementById('header-date').textContent = now.toLocaleDateString('ar-EG', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' });
}

function setupListeners() {
  // Listen for Clients
  onValue(ref(db, 'clients'), snap => {
    window.appState.clients = snap.val() || {};
    renderClients();
    updateClientDropdowns(); // Update comparison dropdowns
    updateDashboard();
  });

  // Listen for Invoices
  onValue(ref(db, 'invoices'), snap => {
    window.appState.invoices = snap.val() || {};
    renderHistory();
    updateDashboard();
  });
}

function updateDashboard() {
  const invoices = Object.values(window.appState.invoices);
  const clients = Object.values(window.appState.clients);
  
  const totalDebt = clients.reduce((s, c) => s + (c.totalDebt || 0), 0);
  document.getElementById('stat-debt').textContent = totalDebt.toLocaleString('ar-EG') + ' ج.م';
  document.getElementById('stat-sales').textContent = invoices.length + ' فاتورة';
}

// ============================================================
// PAGE NAVIGATION
// ============================================================
window.switchPage = function(page, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
  document.getElementById('page-' + page).classList.add('active');
  btn.classList.add('active');
  
  if (page === 'invoice') initInvoiceForm();
};

// ============================================================
// INVOICE LOGIC
// ============================================================
function initInvoiceForm() {
  document.getElementById('inv-date').value = new Date().toISOString().split('T')[0];
  document.getElementById('inv-client').value = '';
  document.getElementById('inv-phone').value = '';
}

window.saveInvoice = async function() {
  const client = document.getElementById('inv-client').value.trim();
  const phone = document.getElementById('inv-phone').value.trim();
  const dateISO = document.getElementById('inv-date').value;

  if (!client || !phone) return showToast('❌ يرجى إدخال الاسم والهاتف');

  const invoice = {
    clientName: client,
    phone: phone,
    date: dateISO,
    total: 100, // Default value for demo
    createdAt: Date.now()
  };

  try {
    const invRef = push(ref(db, 'invoices'));
    await set(invRef, invoice);

    const clientRef = ref(db, 'clients/' + phone);
    const snap = await get(clientRef);
    if (snap.exists()) {
      const data = snap.val();
      await set(clientRef, {
        ...data,
        totalDebt: (data.totalDebt || 0) + 100,
        lastInvoice: dateISO
      });
    } else {
      await set(clientRef, {
        name: client,
        phone: phone,
        totalDebt: 100,
        lastInvoice: dateISO
      });
    }
    
    showToast('✅ تم حفظ الفاتورة');
    switchPage('history', document.querySelectorAll('.nav-item')[3]);
  } catch (e) {
    showToast('❌ خطأ: ' + e.message);
  }
};

// ============================================================
// CLIENTS LOGIC
// ============================================================
window.renderClients = function() {
  const search = (document.getElementById('client-search')?.value || '').toLowerCase();
  let clients = Object.entries(window.appState.clients);
  
  // Filter
  if (search) {
    clients = clients.filter(([k, c]) => c.name?.toLowerCase().includes(search));
  }
  
  // SORT: Oldest to Newest by Date (As Requested)
  clients.sort((a, b) => {
    const dateA = a[1].lastInvoice || '0000-00-00';
    const dateB = b[1].lastInvoice || '0000-00-00';
    return dateA.localeCompare(dateB); // Oldest first
  });

  const container = document.getElementById('clients-list');
  if (!container) return;

  container.innerHTML = clients.map(([key, c]) => `
    <div class="client-card" onclick="alert('فتح حساب: ${c.name}')">
      <div class="client-name">👤 ${c.name}</div>
      <div class="client-phone">📱 ${c.phone} | 📅 ${c.lastInvoice || 'لا توجد فواتير'}</div>
      <div style="margin-top:5px;font-weight:900;color:var(${(c.totalDebt||0)>0?'--danger':'--emerald'})">
        ${(c.totalDebt||0).toLocaleString('ar-EG')} ج.م
      </div>
    </div>
  `).join('');
};

// ============================================================
// HISTORY LOGIC
// ============================================================
window.renderHistory = function() {
  const container = document.getElementById('history-list');
  if (!container) return;
  
  let invoices = Object.entries(window.appState.invoices);
  // Sort by date descending
  invoices.sort((a, b) => (b[1].createdAt || 0) - (a[1].createdAt || 0));

  container.innerHTML = invoices.map(([id, inv]) => `
    <div class="client-card">
      <div class="client-name">🧾 ${inv.clientName}</div>
      <div class="client-phone">📅 ${inv.date} | 💰 ${inv.total} ج.م</div>
    </div>
  `).join('');
};

// ============================================================
// COMPARISON & PRICES LOGIC (NEW)
// ============================================================
function updateClientDropdowns() {
  const clients = window.appState.clients;
  const select1 = document.getElementById('cmp-client1');
  const select2 = document.getElementById('cmp-client2');
  
  // Keep placeholder
  select1.innerHTML = '<option value="">العميل الأول</option>';
  select2.innerHTML = '<option value="">العميل الثاني</option>';

  Object.values(clients).forEach(c => {
    const opt1 = document.createElement('option');
    opt1.value = c.phone;
    opt1.textContent = c.name;
    select1.appendChild(opt1);

    const opt2 = document.createElement('option');
    opt2.value = c.phone;
    opt2.textContent = c.name;
    select2.appendChild(opt2);
  });
}

function initComparisonTools() {
    // Populate fish dropdown (Dummy data for now)
    const fishSelect = document.getElementById('cmp-fish');
    const fishes = ['بلطي', 'بوري', 'طوبار', 'قراميط'];
    fishSelect.innerHTML = '<option value="">اختر الصنف</option>';
    fishes.forEach(f => {
        const opt = document.createElement('option');
        opt.value = f;
        opt.textContent = f;
        fishSelect.appendChild(opt);
    });
}

window.runPriceComparison = function() {
  const p1Key = document.getElementById('cmp-client1').value;
  const p2Key = document.getElementById('cmp-client2').value;
  const fish = document.getElementById('cmp-fish').value;
  const date = document.getElementById('cmp-date').value;

  if (!p1Key || !p2Key || !fish || !date) {
    showToast('❌ يرجى اختيار العميلين والصنف والتاريخ');
    return;
  }

  // Dummy Logic for Demonstration
  // In real app, you would filter appState.invoices by date and fish
  const c1 = window.appState.clients[p1Key];
  const c2 = window.appState.clients[p2Key];

  const price1 = Math.floor(Math.random() * 30) + 20; // Random price for demo
  const price2 = Math.floor(Math.random() * 30) + 20; // Random price for demo

  let html = `
    <div class="comparison-result-box">
      <div style="font-size:12px;color:var(--text-secondary);margin-bottom:8px">
        مقارنة أسعار <strong>${fish}</strong> بتاريخ <strong>${date}</strong>
      </div>
      <div style="display:flex;justify-content:space-between;gap:10px">
        <div style="flex:1;text-align:center;padding:10px;background:rgba(0,0,0,0.2);border-radius:8px">
          <div style="font-size:11px;color:var(--text-secondary)">${c1.name}</div>
          <div style="font-size:20px;font-weight:900;color:var(--cyan-glow)">${price1} ج.م</div>
        </div>
        <div style="flex:1;text-align:center;padding:10px;background:rgba(0,0,0,0.2);border-radius:8px">
          <div style="font-size:11px;color:var(--text-secondary)">${c2.name}</div>
          <div style="font-size:20px;font-weight:900;color:var(--cyan-glow)">${price2} ج.م</div>
        </div>
      </div>
  `;

  if (price1 !== price2) {
    const winner = price1 > price2 ? c1.name : c2.name;
    const winnerPrice = Math.max(price1, price2);
    html += `
      <div class="winner-card">
        <div style="font-size:10px;color:var(--gold)">🏆 أعلى سعر</div>
        <div style="font-size:14px;font-weight:900">${winner}</div>
        <div style="font-size:18px;font-weight:900;color:var(--gold)">${winnerPrice} ج.م</div>
      </div>
    `;
  }

  html += `</div>`;
  
  document.getElementById('cmp-result').innerHTML = html;
  document.getElementById('cmp-result').style.display = 'block';
};

window.showToast = function(msg) {
  const old = document.querySelector('.toast');
  if (old) old.remove();
  const t = document.createElement('div');
  t.className = 'toast';
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.remove(), 3000);
};

// Background Animation
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
function resize() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
resize();
window.addEventListener('resize', resize);
let particles = [];
for(let i=0; i<30; i++) particles.push({x:Math.random()*canvas.width, y:Math.random()*canvas.height, r:Math.random()*2, s:Math.random()*0.5+0.1});
function animate() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = '#0a1628';
  ctx.fillRect(0,0,canvas.width,canvas.height);
  particles.forEach(p => {
    p.y -= p.s;
    if(p.y < 0) { p.y = canvas.height; p.x = Math.random()*canvas.width; }
    ctx.beginPath(); ctx.arc(p.x, p.y, p.r, 0, Math.PI*2);
    ctx.fillStyle = 'rgba(100,200,255,0.3)'; ctx.fill();
  });
  requestAnimationFrame(animate);
}
animate();
