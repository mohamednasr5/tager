<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#040d1a">
    <title>404 - الصفحة تم اصطيادها!</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800;900&display=swap');

        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background: #040d1a;
            color: #e8f4f8;
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Ocean BG */
        .ocean {
            position: fixed;
            inset: 0;
            background: linear-gradient(180deg, #040d1a 0%, #0a1628 20%, #0f2847 50%, #0d3b66 80%, #1a5276 100%);
            z-index: 0;
        }

        /* Light rays */
        .rays {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }
        .ray {
            position: absolute;
            top: 0;
            width: 2px;
            height: 100%;
            background: linear-gradient(180deg, rgba(144,224,239,0.5), transparent);
            animation: rayFlicker 5s ease-in-out infinite;
        }
        @keyframes rayFlicker {
            0%, 100% { opacity: 0.2; }
            50% { opacity: 0.6; }
        }

        /* Bubbles */
        .bubbles {
            position: fixed;
            inset: 0;
            z-index: 1;
            pointer-events: none;
            overflow: hidden;
        }
        .bub {
            position: absolute;
            bottom: -40px;
            border-radius: 50%;
            border: 1px solid rgba(144,224,239,0.25);
            background: radial-gradient(circle at 30% 30%, rgba(144,224,239,0.1), transparent);
            animation: bubUp linear infinite;
        }
        @keyframes bubUp {
            0% { transform: translateY(0) scale(1); opacity: 0.6; }
            100% { transform: translateY(-120vh) scale(0.5); opacity: 0; }
        }

        /* ===== MAIN SCENE ===== */
        .scene {
            position: relative;
            z-index: 10;
            width: 100%;
            max-width: 500px;
            padding: 20px;
            text-align: center;
        }

        /* ===== SVG ANIMATION CONTAINER ===== */
        .animation-container {
            width: 100%;
            max-width: 420px;
            margin: 0 auto 30px;
            position: relative;
        }

        /* ===== TEXT OVERLAY ===== */
        .text-overlay {
            position: relative;
            z-index: 20;
            opacity: 0;
            transform: translateY(20px);
            animation: textAppear 0.8s ease-out 6.5s forwards;
        }

        @keyframes textAppear {
            to { opacity: 1; transform: translateY(0); }
        }

        .error-code {
            font-size: 5rem;
            font-weight: 900;
            background: linear-gradient(135deg, #00b4d8, #d4a853, #48cae4);
            background-size: 200% 200%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradShift 3s ease-in-out infinite;
            line-height: 1;
            margin-bottom: 8px;
        }

        @keyframes gradShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .caught-msg {
            font-size: 1.3rem;
            font-weight: 700;
            color: #e8f4f8;
            margin-bottom: 6px;
        }

        .sub-msg {
            font-size: 0.85rem;
            color: rgba(144,224,239,0.7);
            margin-bottom: 20px;
            line-height: 1.8;
        }

        .redirect-bar {
            width: 200px;
            height: 4px;
            background: rgba(0,180,216,0.15);
            border-radius: 4px;
            margin: 0 auto 12px;
            overflow: hidden;
        }

        .redirect-fill {
            width: 0%;
            height: 100%;
            background: linear-gradient(90deg, #00b4d8, #d4a853);
            border-radius: 4px;
            animation: fillBar 10s linear 6.5s forwards;
        }

        @keyframes fillBar {
            to { width: 100%; }
        }

        .countdown {
            font-size: 0.8rem;
            color: rgba(144,224,239,0.5);
        }

        .countdown span {
            color: #d4a853;
            font-weight: 700;
            font-size: 1rem;
        }

        .go-home {
            display: inline-block;
            margin-top: 16px;
            padding: 10px 30px;
            background: linear-gradient(135deg, rgba(0,180,216,0.2), rgba(0,180,216,0.05));
            border: 1px solid rgba(0,180,216,0.4);
            border-radius: 30px;
            color: #90e0ef;
            text-decoration: none;
            font-family: 'Cairo', sans-serif;
            font-size: 0.85rem;
            font-weight: 600;
            transition: all 0.3s ease;
            opacity: 0;
            animation: textAppear 0.5s ease-out 7s forwards;
        }

        .go-home:hover {
            background: rgba(0,180,216,0.3);
            border-color: rgba(0,180,216,0.7);
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(0,180,216,0.2);
        }

        /* ===== SMALL SWIMMING FISH BG ===== */
        .bg-fish {
            position: fixed;
            z-index: 2;
            pointer-events: none;
            opacity: 0.15;
        }
        .bg-fish-1 { top: 15%; animation: swimBg 20s linear infinite; }
        .bg-fish-2 { top: 75%; animation: swimBg 28s linear infinite reverse; animation-delay: -10s; }
        .bg-fish-3 { top: 50%; animation: swimBg 24s linear infinite; animation-delay: -5s; }

        @keyframes swimBg {
            0% { transform: translateX(-100px); }
            100% { transform: translateX(calc(100vw + 100px)); }
        }

        /* Waves bottom */
        .wave-bottom {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 200%;
            height: 100px;
            z-index: 3;
            pointer-events: none;
        }
        .wave-bottom svg { width: 100%; height: 100%; }
        .wb1 { animation: waveFlow 10s linear infinite; }
        .wb2 { animation: waveFlow 15s linear infinite reverse; opacity: 0.3; bottom: -8px; }
        @keyframes waveFlow {
            from { transform: translateX(0); }
            to { transform: translateX(-50%); }
        }

        /* ===== SPLASH EFFECT ===== */
        .splash-circle {
            position: absolute;
            border-radius: 50%;
            border: 2px solid rgba(144,224,239,0.5);
            opacity: 0;
            pointer-events: none;
        }
        .splash-1 {
            width: 60px; height: 60px;
            top: 35%; left: 50%;
            transform: translate(-50%, -50%);
            animation: splashRing 1s ease-out 4.2s forwards;
        }
        .splash-2 {
            width: 100px; height: 100px;
            top: 35%; left: 50%;
            transform: translate(-50%, -50%);
            animation: splashRing 1.2s ease-out 4.4s forwards;
        }
        .splash-3 {
            width: 140px; height: 140px;
            top: 35%; left: 50%;
            transform: translate(-50%, -50%);
            animation: splashRing 1.4s ease-out 4.6s forwards;
        }
        @keyframes splashRing {
            0% { opacity: 0.8; transform: translate(-50%, -50%) scale(0.3); }
            100% { opacity: 0; transform: translate(-50%, -50%) scale(2.5); }
        }

        /* Screen shake on catch */
        .shake {
            animation: screenShake 0.4s ease-out 4.3s;
        }
        @keyframes screenShake {
            0%, 100% { transform: translate(0); }
            15% { transform: translate(-4px, 2px); }
            30% { transform: translate(4px, -2px); }
            45% { transform: translate(-3px, -1px); }
            60% { transform: translate(3px, 1px); }
            75% { transform: translate(-1px, 1px); }
        }

        /* Water droplets on catch */
        .droplet {
            position: absolute;
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(144,224,239,0.6);
            top: 35%;
            left: 50%;
            opacity: 0;
            pointer-events: none;
        }

        @media (max-width: 400px) {
            .error-code { font-size: 3.5rem; }
            .caught-msg { font-size: 1.1rem; }
        }
    </style>
</head>

    <script>
        // ===== GENERATE RAYS =====
        (function() {
            const c = document.getElementById('rays');
            for (let i = 0; i < 6; i++) {
                const r = document.createElement('div');
                r.className = 'ray';
                r.style.left = (8 + Math.random() * 84) + '%';
                r.style.animationDelay = (Math.random() * 5) + 's';
                r.style.animationDuration = (4 + Math.random() * 3) + 's';
                c.appendChild(r);
            }
        })();

        // ===== GENERATE BUBBLES =====
        (function() {
            const c = document.getElementById('bubbles');
            for (let i = 0; i < 10; i++) {
                const b = document.createElement('div');
                b.className = 'bub';
                const s = 6 + Math.random() * 20;
                b.style.width = s + 'px';
                b.style.height = s + 'px';
                b.style.left = (Math.random() * 100) + '%';
                b.style.animationDuration = (10 + Math.random() * 15) + 's';
                b.style.animationDelay = (Math.random() * 8) + 's';
                c.appendChild(b);
            }
        })();

        // ===== MAIN FISH & HOOK ANIMATION =====
        (function() {
            const fishGroup = document.getElementById('fishGroup');
            const hookGroup = document.getElementById('hookGroup');
            const fishingLine = document.getElementById('fishingLine');
            const baitGroup = document.getElementById('baitGroup');
            const fishMouth = document.getElementById('fishMouth');
            const splashGroup = document.getElementById('splashGroup');
            const exclaimGroup = document.getElementById('exclaimGroup');
            const starGroup = document.getElementById('starGroup');
            const timerEl = document.getElementById('timer');

            // Phase timings (seconds)
            const PHASE = {
                SWIM_START: 0,      // Fish enters from left
                APPROACH: 2.5,       // Fish notices bait, slows
                BITE: 4.2,           // Fish bites!
                CAUGHT: 4.5,         // Hooked, splash
                PULL_UP: 5.5,        // Gets pulled up
                GONE: 6.5,           // Fish gone up
            };

            let startTime = null;
            let currentPhase = 'swim';

            // Keyframe positions for the fish
            function getFishTransform(t) {
                if (t < PHASE.APPROACH) {
                    // Swimming from left toward the hook area
                    const progress = t / PHASE.APPROACH;
                    const ease = progress < 0.7 
                        ? (progress / 0.7) * 0.6  // Fast swim to 60%
                        : 0.6 + ((progress - 0.7) / 0.3) * 0.15; // Slow approach
                    const x = -120 + ease * 295; // -120 -> 175
                    const y = 180 + Math.sin(t * 3) * 8; // Gentle bobbing
                    return { x, y, mouthOpen: false, tailSpeed: 0.8 };
                }
                else if (t < PHASE.BITE) {
                    // Carefully approaching bait
                    const progress = (t - PHASE.APPROACH) / (PHASE.BITE - PHASE.APPROACH);
                    const ease = 1 - Math.pow(1 - progress, 3); // ease-out cubic
                    const x = 175 + ease * 22; // 175 -> 197
                    const y = 180 - ease * 60 + Math.sin(t * 5) * 3; // 180 -> 120
                    return { x, y, mouthOpen: progress > 0.7, tailSpeed: 1.2 };
                }
                else if (t < PHASE.CAUGHT) {
                    // BITE! Quick snap to hook
                    const progress = (t - PHASE.BITE) / (PHASE.CAUGHT - PHASE.BITE);
                    const x = 197 + progress * 5;
                    const y = 120 - progress * 5;
                    return { x, y, mouthOpen: true, tailSpeed: 2 };
                }
                else if (t < PHASE.PULL_UP) {
                    // Caught - being pulled up while struggling
                    const progress = (t - PHASE.CAUGHT) / (PHASE.PULL_UP - PHASE.CAUGHT);
                    const x = 202 + Math.sin(t * 15) * 12 * (1 - progress); // Struggle
                    const y = 115 - progress * 80; // Pulled up
                    return { x, y, mouthOpen: true, tailSpeed: 3 };
                }
                else if (t < PHASE.GONE) {
                    // Disappearing up
                    const progress = (t - PHASE.PULL_UP) / (PHASE.GONE - PHASE.PULL_UP);
                    const x = 202 + Math.sin(t * 20) * 5 * (1 - progress);
                    const y = 35 - progress * 50;
                    const opacity = 1 - progress;
                    return { x, y, mouthOpen: true, tailSpeed: 4, opacity };
                }
                else {
                    return { x: 202, y: -20, mouthOpen: false, tailSpeed: 0, opacity: 0 };
                }
            }

            // Hook animation
            function getHookTransform(t) {
                if (t < PHASE.BITE) {
                    // Gentle sway
                    const sway = Math.sin(t * 1.5) * 3;
                    const y = 40 + Math.sin(t * 0.8) * 5;
                    return { x: 210 + sway, y, baitVisible: true };
                }
                else if (t < PHASE.CAUGHT) {
                    // Snagged! Jolt
                    const progress = (t - PHASE.BITE) / (PHASE.CAUGHT - PHASE.BITE);
                    return { x: 210, y: 40 + progress * 5, baitVisible: true };
                }
                else {
                    // Pull up with fish
                    const progress = Math.min((t - PHASE.CAUGHT) / 3, 1);
                    const y = 45 - progress * 60;
                    return { x: 210 + Math.sin(t * 15) * 3 * (1 - progress), y, baitVisible: progress < 0.5 };
                }
            }

            // Countdown timer
            let countdown = 10;
            const countdownInterval = setInterval(() => {
                if (countdown > 0) {
                    countdown--;
                    if (timerEl) timerEl.textContent = countdown;
                } else {
                    clearInterval(countdownInterval);
                    window.location.href = 'https://mohamednasr5.github.io/tager/home/index.html';
                }
            }, 1000);

            // Splash sound effect
            function playSplashSound() {
                try {
                    const ctx = new (window.AudioContext || window.webkitAudioContext)();
                    
                    // White noise burst for splash
                    const bufferSize = ctx.sampleRate * 0.5;
                    const buffer = ctx.createBuffer(1, bufferSize, ctx.sampleRate);
                    const data = buffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) {
                        data[i] = (Math.random() * 2 - 1) * Math.exp(-i / (ctx.sampleRate * 0.1));
                    }
                    
                    const source = ctx.createBufferSource();
                    source.buffer = buffer;
                    
                    const bandpass = ctx.createBiquadFilter();
                    bandpass.type = 'bandpass';
                    bandpass.frequency.value = 2000;
                    bandpass.Q.value = 0.8;
                    
                    const gain = ctx.createGain();
                    gain.gain.setValueAtTime(0.3, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
                    
                    source.connect(bandpass);
                    bandpass.connect(gain);
                    gain.connect(ctx.destination);
                    source.start();
                    
                    // Bubble sounds
                    setTimeout(() => {
                        const osc = ctx.createOscillator();
                        osc.type = 'sine';
                        osc.frequency.setValueAtTime(800, ctx.currentTime);
                        osc.frequency.exponentialRampToValueAtTime(400, ctx.currentTime + 0.3);
                        const g = ctx.createGain();
                        g.gain.setValueAtTime(0.1, ctx.currentTime);
                        g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.3);
                        osc.connect(g);
                        g.connect(ctx.destination);
                        osc.start();
                        osc.stop(ctx.currentTime + 0.3);
                    }, 200);
                } catch(e) {}
            }

            // Animation loop
            let splashTriggered = false;
            let exclaimTriggered = false;

            function animate(timestamp) {
                if (!startTime) startTime = timestamp;
                const t = (timestamp - startTime) / 1000; // seconds

                // Fish
                const fish = getFishTransform(t);
                fishGroup.setAttribute('transform', `translate(${fish.x}, ${fish.y})`);
                if (fish.opacity !== undefined) {
                    fishGroup.style.opacity = fish.opacity;
                }
                
                // Mouth
                fishMouth.setAttribute('opacity', fish.mouthOpen ? '1' : '0');
                fishMouth.setAttribute('rx', fish.mouthOpen ? '4' : '2');
                fishMouth.setAttribute('ry', fish.mouthOpen ? '5' : '3');

                // Tail animation speed
                const tail = document.getElementById('fishTail');
                if (tail) {
                    const dur = (0.8 / (fish.tailSpeed || 0.8)).toFixed(2);
                    tail.querySelector('animateTransform').setAttribute('dur', dur + 's');
                }

                // Hook
                const hook = getHookTransform(t);
                hookGroup.setAttribute('transform', `translate(${hook.x}, ${hook.y})`);
                
                // Fishing line
                const hookCenterY = hook.y + 50;
                fishingLine.setAttribute('x2', hook.x);
                fishingLine.setAttribute('y2', Math.max(0, hookCenterY));

                // Bait
                baitGroup.setAttribute('opacity', hook.baitVisible ? '1' : '0');

                // Splash effect at bite
                if (t >= PHASE.BITE && !splashTriggered) {
                    splashTriggered = true;
                    splashGroup.setAttribute('opacity', '1');
                    playSplashSound();
                    
                    setTimeout(() => {
                        splashGroup.setAttribute('opacity', '0');
                    }, 800);
                }

                // Exclamation marks
                if (t >= PHASE.CAUGHT && !exclaimTriggered) {
                    exclaimTriggered = true;
                    exclaimGroup.setAttribute('opacity', '1');
                    starGroup.setAttribute('opacity', '1');
                    
                    // Animate exclaim and star
                    let flashCount = 0;
                    const flashInterval = setInterval(() => {
                        flashCount++;
                        const op = flashCount % 2 === 0 ? '1' : '0.3';
                        exclaimGroup.setAttribute('opacity', op);
                        starGroup.setAttribute('opacity', op);
                        if (flashCount > 8) {
                            clearInterval(flashInterval);
                            exclaimGroup.setAttribute('opacity', '0');
                            starGroup.setAttribute('opacity', '0');
                        }
                    }, 200);
                }

                if (t < 10) {
                    requestAnimationFrame(animate);
                }
            }

            // Start after a brief pause
            setTimeout(() => {
                requestAnimationFrame(animate);
            }, 300);
        })();
    </script>
</body>
